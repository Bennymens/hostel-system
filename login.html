<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - UPSA ACCOMMODATION FINDER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <!-- Login Form -->
    <div class="auth-page">
      <div class="auth-image-side">
        <img
          src="img/office-skyscrapers-business-district (1).jpg"
          alt="UPSA ACCOMMODATION FINDER"
        />
        <div class="auth-image-overlay">
          <h2>
            <i class="fas fa-bed"></i> UPSA <span>ACCOMMODATION FINDER</span>
          </h2>
          <p>Find your perfect student accommodation near campus.</p>
        </div>
      </div>
      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Log in to your UPSA ACCOMMODATION FINDER account</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="student@example.com"
              required
            />
            <div class="form-error" id="emailError">
              Please enter a valid email
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-toggle">
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Enter your password"
                required
              />
              <button
                type="button"
                class="toggle-btn"
                onclick="togglePassword('password', this)"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="form-error" id="passwordError">
              Password is required
            </div>
          </div>

          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 1rem;
            "
          >
            <label class="checkbox-label" style="font-size: 0.85rem">
              <input type="checkbox" /> Remember me
            </label>
            <a
              href="#"
              style="
                font-size: 0.85rem;
                color: var(--primary);
                font-weight: 500;
              "
              >Forgot password?</a
            >
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">
            Log in
          </button>
        </form>

        <div class="auth-divider">or</div>

        <button class="btn btn-outline btn-block" style="gap: 0.75rem">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          Continue with Google
        </button>

        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Sign up</a></p>
          <p class="mt-2" style="font-size: 0.8rem; opacity: 0.6;">
            Staff or Management? <a href="admin_login.html">Admin Login</a>
          </p>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
