<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - UPSA ACCOMMODATION FINDER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-brand">
        <a href="index.html" class="logo"
          ><i class="fas fa-bed"></i> UPSA <span>ACCOMMODATION FINDER</span></a
        >
      </div>
      <div class="navbar-nav" id="navMenu">
        <a href="search.html">Hostels</a>
        <a href="schools.html">Schools</a>
        <a href="popular.html">Popular</a>
      </div>
      <div class="navbar-actions">
        <a href="register.html" class="btn btn-outline">Sign up</a>
        <a href="login.html" class="btn btn-primary">Log in</a>
      </div>
      <div class="nav-toggle" id="navToggle">
        <span></span><span></span><span></span>
      </div>
    </nav>

    <div class="profile-page">
      <!-- Profile Header -->
      <div class="profile-header" id="profileHeader">
        <div class="profile-avatar" id="profileAvatar">K</div>
        <div class="profile-info">
          <h2 id="profileName">Student Name</h2>
          <p id="profileEmail">student@example.com</p>
          <p
            id="profileSchool"
            class="text-xs text-muted"
            style="margin-top: 0.15rem"
          ></p>
        </div>
        <div class="profile-actions">
          <button class="btn btn-outline btn-sm" onclick="Auth.logout()">
            <i class="fas fa-sign-out-alt"></i> Log out
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="profile-tabs">
        <div class="profile-tab active" data-tab="bookings">
          <i class="fas fa-bookmark"></i> My Bookings
        </div>
        <div class="profile-tab" data-tab="settings">
          <i class="fas fa-cog"></i> Settings
        </div>
      </div>

      <!-- Bookings Panel -->
      <div class="profile-panel active" id="panel-bookings">
        <div class="booking-list" id="bookingList">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Settings Panel -->
      <div class="profile-panel" id="panel-settings">
        <form class="settings-form" id="settingsForm">
          <h3 style="margin-bottom: 1rem">Account Settings</h3>
          <div class="form-group">
            <label>Full name</label>
            <input type="text" class="form-control" id="settingsName" />
          </div>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" class="form-control" id="settingsEmail" />
          </div>
          <div class="form-group">
            <label>Phone number</label>
            <input type="tel" class="form-control" id="settingsPhone" />
          </div>
          <div class="form-group">
            <label>School</label>
            <select class="form-control" id="settingsSchool">
              <option value="ug">University of Ghana, Legon</option>
              <option value="knust">KNUST, Kumasi</option>
              <option value="ucc">University of Cape Coast</option>
              <option value="ashesi">Ashesi University</option>
              <option value="gimpa">GIMPA</option>
              <option value="other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const user = Auth.getUser();

        if (!user) {
          window.location.href = "login.html";
          return;
        }

        // Populate profile
        document.getElementById("profileName").textContent =
          user.name || "Student";
        document.getElementById("profileEmail").textContent = user.email || "";
        document.getElementById("profileAvatar").textContent = (user.name ||
          "S")[0].toUpperCase();

        const schoolLabels = {
          ug: "University of Ghana, Legon",
          knust: "KNUST, Kumasi",
          ucc: "University of Cape Coast",
          ashesi: "Ashesi University",
          gimpa: "GIMPA",
        };
        document.getElementById("profileSchool").textContent =
          schoolLabels[user.school] || "";

        // Settings form
        document.getElementById("settingsName").value = user.name || "";
        document.getElementById("settingsEmail").value = user.email || "";
        document.getElementById("settingsPhone").value = user.phone || "";
        if (user.school)
          document.getElementById("settingsSchool").value = user.school;

        document
          .getElementById("settingsForm")
          .addEventListener("submit", (e) => {
            e.preventDefault();
            user.name = document.getElementById("settingsName").value;
            user.email = document.getElementById("settingsEmail").value;
            user.phone = document.getElementById("settingsPhone").value;
            user.school = document.getElementById("settingsSchool").value;
            Auth.login(user);
            showToast("Settings saved!", "success");
            document.getElementById("profileName").textContent = user.name;
            document.getElementById("profileEmail").textContent = user.email;
            document.getElementById("profileAvatar").textContent =
              user.name[0].toUpperCase();
          });

        // Tabs
        document.querySelectorAll(".profile-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll(".profile-tab")
              .forEach((t) => t.classList.remove("active"));
            document
              .querySelectorAll(".profile-panel")
              .forEach((p) => p.classList.remove("active"));
            tab.classList.add("active");
            document
              .getElementById(`panel-${tab.dataset.tab}`)
              .classList.add("active");
          });
        });

        // Render bookings
        const bookings = JSON.parse(
          localStorage.getItem("acchostel_bookings") || "[]",
        );
        const list = document.getElementById("bookingList");

        if (bookings.length === 0) {
          list.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-calendar-times"></i>
            <p>No bookings yet. <a href="search.html" style="color:var(--primary); font-weight:600;">Browse hostels</a> to make your first booking!</p>
          </div>
        `;
          return;
        }

        list.innerHTML = bookings
          .map((b) => {
            const hostel = HOSTELS.find((h) => h.id === b.hostelId);
            return `
          <div class="booking-item ${b.status === "cancelled" ? "cancelled" : ""}">
            <img src="${hostel ? hostel.image : ""}" alt="${b.hostelName}" class="booking-item-image">
            <div class="booking-item-info">
              <h4>${b.hostelName}</h4>
              <p class="booking-meta">${b.room} · ${b.moveIn} to ${b.moveOut}</p>
              <span class="booking-ref-small">${b.ref}</span>
            </div>
            <div class="booking-item-actions">
              <span class="booking-status ${b.status}">${b.status.charAt(0).toUpperCase() + b.status.slice(1)}</span>
              ${b.status !== "cancelled" ? `<button class="btn btn-sm btn-outline" onclick="cancelBooking('${b.ref}')">Cancel</button>` : ""}
            </div>
          </div>
        `;
          })
          .join("");
      });

      function cancelBooking(ref) {
        if (!confirm("Are you sure you want to cancel this booking?")) return;
        const bookings = JSON.parse(
          localStorage.getItem("acchostel_bookings") || "[]",
        );
        const idx = bookings.findIndex((b) => b.ref === ref);
        if (idx !== -1) {
          bookings[idx].status = "cancelled";
          localStorage.setItem("acchostel_bookings", JSON.stringify(bookings));
          showToast("Booking cancelled", "info");
          setTimeout(() => location.reload(), 500);
        }
      }
    </script>
  </body>
</html>
