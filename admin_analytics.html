<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platform Analytics | Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-bed"></i> UPSA <span>FINDER</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="Dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Overview</a>
                <a href="admin_hostels.html" class="nav-link"><i class="fas fa-building"></i> Hostels</a>
                <a href="admin_bookings.html" class="nav-link"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a href="admin_users.html" class="nav-link"><i class="fas fa-users"></i> Users</a>
                <a href="admin_analytics.html" class="nav-link active"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="admin_settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="flex items-center gap-4">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                </div>
                <div class="header-actions">
                    <div class="admin-profile">
                        <div class="admin-avatar">A</div>
                        <div class="admin-info"><span>Admin User</span><small>Super Admin</small></div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="page-header">
                    <h1>Platform Analytics</h1>
                    <p>Visual data and growth trends.</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <p>Booking Growth</p>
                            <h3>+12.5%</h3>
                            <small class="text-accent"><i class="fas fa-arrow-up"></i> Since last month</small>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <p>User Retention</p>
                            <h3>88%</h3>
                            <small class="text-accent"><i class="fas fa-arrow-up"></i> Stable</small>
                        </div>
                    </div>
                </div>
                <div class="card mt-4 p-4 text-center">
                    <div style="height: 300px; display: flex; align-items: center; justify-content: center; background: var(--gray-50); border-radius: var(--radius); border: 2px dashed var(--gray-200);">
                        <div class="text-muted">
                            <i class="fas fa-chart-bar fa-3x mb-3"></i>
                            <p>Chart.js Visualizations will be loaded here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
