<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Bookings | Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-bed"></i> UPSA <span>FINDER</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="Dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Overview</a>
                <a href="admin_hostels.html" class="nav-link"><i class="fas fa-building"></i> Hostels</a>
                <a href="admin_bookings.html" class="nav-link active"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a href="admin_users.html" class="nav-link"><i class="fas fa-users"></i> Users</a>
                <a href="admin_analytics.html" class="nav-link"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="admin_settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="flex items-center gap-4">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <div class="header-search">
                        <div class="form-control-icon">
                            <i class="fas fa-search icon"></i>
                            <input type="text" class="form-control" placeholder="Search bookings...">
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="notification-btn"><i class="far fa-bell"></i><span class="notification-badge"></span></button>
                    <div class="admin-profile">
                        <div class="admin-avatar">A</div>
                        <div class="admin-info"><span>Admin User</span><small>Super Admin</small></div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="page-header">
                    <h1>All Bookings</h1>
                    <p>Track and manage student bookings.</p>
                </div>
                <div class="card">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Student</th>
                                    <th>Hostel</th>
                                    <th>Contact</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="all-bookings-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="revoke-modal" class="modal-card">
            <div class="modal-header">
                <h3>Revoke Application</h3>
                <button class="close-modal" onclick="closeModal('revoke-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to revoke this student's application? This action cannot be undone.</p>
                <input type="hidden" id="revoke-booking-id">
                <div class="modal-footer mt-4">
                    <button type="button" class="btn btn-outline" onclick="closeModal('revoke-modal')">Cancel</button>
                    <button type="button" class="btn btn-primary btn-danger" onclick="confirmRevoke()">Revoke Application</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
