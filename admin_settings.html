<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Settings | Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-bed"></i> UPSA <span>FINDER</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="Dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Overview</a>
                <a href="admin_hostels.html" class="nav-link"><i class="fas fa-building"></i> Hostels</a>
                <a href="admin_bookings.html" class="nav-link"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a href="admin_users.html" class="nav-link"><i class="fas fa-users"></i> Users</a>
                <a href="admin_analytics.html" class="nav-link"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="admin_settings.html" class="nav-link active"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="flex items-center gap-4">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                </div>
                <div class="header-actions">
                    <div class="admin-profile">
                        <div class="admin-avatar">A</div>
                        <div class="admin-info"><span>Admin User</span><small>Super Admin</small></div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="page-header">
                    <h1>System Settings</h1>
                    <p>Configure platform preferences.</p>
                </div>
                <div class="card p-4">
                    <form id="settings-form">
                        <div class="form-group"><label>Platform Name</label><input type="text" class="form-control" value="UPSA ACCOMMODATION FINDER"></div>
                        <div class="form-group"><label>Admin Email</label><input type="email" class="form-control" value="admin@upsafinder.com"></div>
                        <div class="form-group">
                            <label>Currency</label>
                            <select class="form-control">
                                <option value="GHS">Ghanaian Cedi (GH₵)</option>
                                <option value="USD">US Dollar ($)</option>
                            </select>
                        </div>
                        <div class="checkbox-group mb-4">
                            <label class="checkbox-label"><input type="checkbox" checked> Enable email notifications</label>
                            <label class="checkbox-label"><input type="checkbox" checked> Require approval for new hostels</label>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Configuration</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
