<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - UPSA ACCOMMODATION FINDER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <style>
      .admin-auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--gray-900);
        padding: 1rem;
      }
      .admin-auth-card {
        background: #fff;
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        border-radius: var(--radius-lg);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      }
      .admin-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        background: var(--primary-light);
        color: var(--primary);
        font-size: 0.75rem;
        font-weight: 700;
        border-radius: 50px;
        margin-bottom: 1rem;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="admin-auth-page">
      <div class="admin-auth-card">
        <div class="text-center">
          <span class="admin-badge">Secure Access</span>
          <h2 class="mb-2">Admin Portal</h2>
          <p class="text-muted text-sm mb-4">Please enter your credentials to access the dashboard.</p>
        </div>

        <form id="adminLoginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="form-control-icon">
                <i class="fas fa-user icon"></i>
                <input type="text" class="form-control" id="username" placeholder="Enter admin username" required />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="form-control-icon">
                <i class="fas fa-lock icon"></i>
                <input type="password" class="form-control" id="password" placeholder="Enter admin password" required />
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg mt-4">
            Authorize & Enter
          </button>
        </form>

        <div class="mt-4 text-center">
            <a href="index.html" class="text-sm text-muted"><i class="fas fa-arrow-left"></i> Back to main site</a>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script>
      document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;

        if (user === 'admin' && pass === 'admin123') {
          // Success
          const adminUser = {
            name: 'System Admin',
            email: 'admin@upsafinder.com',
            role: 'admin'
          };
          Auth.login(adminUser);
          showToast('Authorization successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          showToast('Invalid admin credentials', 'error');
        }
      });
    </script>
  </body>
</html>
